## stalker en changes
- type: reagent
  id: Cocaine
  name: reagent-name-Cocaine
  group: Narcotics
  desc: reagent-desc-Cocaine
  physicalDesc: reagent-physical-desc-translucent
  contrabandSeverity: Major
  flavor: bitter
  color: "#FAFAFA"
  boilingPoint: 212.0  # Dexosyephedrine vape when?
  meltingPoint: 170.0
  metabolisms:
    Poison:
      metabolismRate: 0.025
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 0.15
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Desoxyephedrine
          min: 30
        damage:
          types:
            Poison: 0.5 # this is added to the base damage of the meth.
            Asphyxiation: 0.5
    Narcotic:
      effects:
      - !type:ModifyStatusEffect
        effectProto: StatusEffectSeeingRainbow
        type: Add
        time: 1
      - !type:GenericStatusEffect
        key: StaminaModifier
        component: StaminaModifier
        time: 3
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
      - !type:Jitter
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 3
        type: Remove
      - !type:ModifyKnockdown
        time: 3
        type: Remove
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: Haloperidol
          max: 0.01
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove
    Medicine:
      effects:
      - !type:ResetNarcolepsy
        conditions:
        - !type:ReagentCondition
          reagent: Desoxyephedrine
          min: 20

