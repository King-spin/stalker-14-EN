
- type: entity
  parent: STBaseIngridient
  id: STCraftPinePlankT1
  name: сосновые доски T1
  description: древесина мягкая, легкая, используется в основном для изготовления фанеры, упаковок, коробок. T1
  suffix: Stalker, крафт, T1
  components:
    - type: PhysicalComposition
      materialComposition:
        Wood: 100
    - type: Sprite
      state: pine
      sprite: _Stalker/Objects/Craft/Materials/wood_planks.rsi
    - type: Stack
      stackType: STPinePlanks
      count: 1
    - type: Craftable
    - type: RepositoryItem
      categoryName: repository-crafting-category
    - type: SliceableFood #EN start
      slice: STTradePlankT1
      count: 1
    - type: Tag
      tags:
      - Lumber
    - type: SolutionContainerManager
      solutions:
        food:
          reagents:
          - ReagentId: Wood
            Quantity: 100

- type: entity
  parent: BaseItem
  id: STTradePlankT1
  name: fine pine plank
  description: A well-cut and dressed plank of pine wood, ready to be sold to a merchant.
  components:
  - type: PhysicalComposition
    materialComposition:
      Wood: 100
  - type: Tag
    tags:
    - Lumber
  - type: Sprite
    state: pine
    sprite: _Stalker/Objects/Craft/Materials/wood_planks.rsi #EN end

